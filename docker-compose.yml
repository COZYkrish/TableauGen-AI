version: "3.9"

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tableaugen_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:////data/tableaugen.db
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
    volumes:
      - tableaugen_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - tableaugen_net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tableaugen_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tableaugen_net

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  tableaugen_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  tableaugen_net:
    driver: bridge
